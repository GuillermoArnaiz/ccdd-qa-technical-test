name: Action Planner – QA Automation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install system dependencies for Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 libpango-1.0-0 libcairo2

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run smoke tests
        run: pytest -m smoke --browser chromium -v --html=reports/smoke-report.html --self-contained-html

      - name: Run full regression suite
        if: always()
        run: pytest --browser chromium -v --html=reports/full-report.html --self-contained-html

      - name: Upload HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 30
