name: Action Planner – QA Automation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run smoke tests
        run: |
          pytest -m smoke --browser chromium --headed=false \
            --html=reports/smoke-report.html --self-contained-html -v

      - name: Run full regression suite
        if: always()
        run: |
          pytest --browser chromium --headed=false \
            --html=reports/full-report.html --self-contained-html -v

      - name: Upload HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 30
